<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Dinâmica Oficina</title>
    
    <!-- Open Graph / SEO -->
    <meta property="og:title" content="Curso Presencial de Osciloscópio - Dinâmica Oficina">
    <meta property="og:description" content="Garanta sua vaga no curso presencial da Dinâmica Oficina nos dias 29 e 30 de Agosto de 2026.">
    <meta property="og:image" content="https://files.greatpages.com.br/arquivos/paginas_editor/473631-b61cd648ceb059fbf6ce1aec13bd75df.png">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    
    <link rel="icon" href="https://pages.greatpages.com.br/www.dinamicaoficina.com.br/1759583681/imagens/desktop/473631-10e8de67cce423819932772a05bf0ac7.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #DA7428;
            --primary-orange-hover: #F28C3D;
            --primary-blue: #18407A;
            --dark-blue: #0A1C35;
            --white: #FFFFFF;
            --text-light: #F0F4F8;
            --glass-bg: rgba(24, 64, 122, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
            /* Fundo escuro com gradiente moderno que remete ao setor automotivo e cores da marca */
            background: linear-gradient(135deg, #0f2027 0%, #18407A 50%, #0A1C35 100%);
            background-size: cover;
            background-attachment: fixed;
        }

        /* Glassmorphism no container principal */
        .form-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 600px;
            margin: 20px 15px;
            transform: translateY(0);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }



        .header {
            background: linear-gradient(to right, rgba(24, 64, 122, 0.9), rgba(10, 28, 53, 0.9));
            padding: 40px 30px;
            text-align: center;
            border-bottom: 3px solid var(--primary-orange);
            position: relative;
        }

        .header img {
            max-width: 140px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--white);
            text-wrap: balance; /* Evita palavras órfãs em títulos */
        }

        .header p {
            margin: 10px 0 0;
            font-size: 15px;
            opacity: 0.85;
            font-weight: 300;
            text-wrap: pretty; /* Evita palavras órfãs em parágrafos */
        }

        .form-content {
            padding: 40px 30px;
        }

        .form-group {
            position: relative;
            margin-bottom: 30px;
        }

        /* Floating labels modernos */
        .form-group input:not([type="radio"]) {
            width: 100%;
            padding: 15px 15px 15px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:not([type="radio"]):focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 4px rgba(218, 116, 40, 0.2);
        }

        .form-group label.floating-label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            pointer-events: none;
            transition: 0.3s ease all;
        }

        /* Label flutuando quando focado ou preenchido */
        .form-group input:not([type="radio"]):focus ~ label.floating-label,
        .form-group input:not([type="radio"]):not(:placeholder-shown) ~ label.floating-label {
            top: 0px;
            font-size: 12px;
            background: var(--dark-blue);
            padding: 0 8px;
            color: var(--primary-orange);
            border-radius: 4px;
            font-weight: 600;
        }

        /* Opções de Pagamento com caixas interativas */
        .payment-section {
            margin-bottom: 35px;
        }

        .payment-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .radio-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .radio-option {
            position: relative;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            display: none;
        }

        .radio-box {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: center;
        }



        .radio-option input[type="radio"]:checked + .radio-box {
            background: var(--primary-orange);
            border-color: var(--primary-orange);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(218, 116, 40, 0.4);
            transform: scale(1.05);
        }

        /* Botão de Enviar com animação */
        .submit-btn {
            background: linear-gradient(135deg, var(--primary-orange) 0%, var(--primary-orange-hover) 100%);
            color: var(--white);
            border: none;
            padding: 20px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(218, 116, 40, 0.4);
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(218, 116, 40, 0.6);
        }

        .submit-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(218, 116, 40, 0.4);
        }

        /* Efeito de brilho ao passar o mouse */
        .submit-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: all 0.75s ease;
        }

        .submit-btn:hover::after {
            left: 150%;
        }

        .hidden-iframe {
            display: none;
        }

        /* Mensagem de Sucesso Animada */
        .success-message {
            display: none;
            text-align: center;
            padding: 60px 30px;
        }

        .success-icon {
            font-size: 70px;
            color: var(--primary-orange);
            margin-bottom: 20px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            display: inline-block;
        }

        .success-message h2 {
            color: var(--white);
            margin: 0 0 15px 0;
            font-size: 28px;
            animation: slideUp 0.5s ease 0.2s forwards;
            opacity: 0;
        }
        
        .success-message p {
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            animation: slideUp 0.5s ease 0.4s forwards;
            opacity: 0;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes slideUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Responsividade para Tablet */
        @media (max-width: 768px) {
            .header {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 22px;
            }
            .form-content {
                padding: 30px 20px;
            }
            .success-message {
                padding: 40px 20px;
            }
        }

        /* Responsividade para Celular */
        @media (max-width: 480px) {
            .form-container {
                margin: 15px;
                border-radius: 15px;
            }
            .header img {
                max-width: 120px;
                margin-bottom: 15px;
            }
            .header h1 {
                font-size: 20px;
            }
            .header p {
                font-size: 14px;
            }
            .form-content {
                padding: 25px 15px;
            }
            .radio-group {
                grid-template-columns: 1fr;
            }
            .submit-btn {
                padding: 16px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container" id="formWrapper">
        <div class="header">
            <img src="https://files.greatpages.com.br/arquivos/paginas_editor/473631-b61cd648ceb059fbf6ce1aec13bd75df.png" alt="Dinâmica Oficina Logo">
            <h1>Curso Presencial de Osciloscópio</h1>
            <p>Dinâmica Oficina – 29 e 30 de Agosto de 2026</p>
        </div>

        <div class="form-content" id="formContent">
            <!-- 
            O action aponta para o Google Forms
            O target aponta para um iframe invisível para evitar que a página saia 
            -->
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSe2V8HcUUBmL3qlS5sfwa9VnFCLh0T68GXtEEEJOESD4E8atQ/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                
                <div class="form-group">
                    <input type="text" id="nome" name="entry.1790888721" placeholder=" " required>
                    <label for="nome" class="floating-label">Nome Completo Obrigatório</label>
                </div>

                <div class="form-group">
                    <input type="text" id="nascimento" name="entry.138485746" placeholder=" " required maxlength="10" oninput="maskDate(this)">
                    <label for="nascimento" class="floating-label">Data de Nascimento (DD/MM/AAAA)</label>
                </div>

                <div class="form-group">
                    <input type="text" id="cidade" name="entry.2031077012" placeholder=" " required list="cities-list">
                    <datalist id="cities-list"></datalist>
                    <label for="cidade" class="floating-label">Cidade</label>
                </div>

                <div class="form-group">
                    <input type="text" id="cpf" name="entry.320675462" placeholder=" " required maxlength="14" oninput="maskCPF(this)">
                    <label for="cpf" class="floating-label">CPF</label>
                </div>

                <div class="form-group">
                    <input type="email" id="email" name="entry.950819303" placeholder=" " required>
                    <label for="email" class="floating-label">E-mail</label>
                </div>

                <div class="form-group">
                    <input type="text" id="instagram" name="entry.775493518" placeholder=" ">
                    <label for="instagram" class="floating-label">Instagram (opcional)</label>
                </div>

                <div class="payment-section">
                    <label class="payment-title">Forma de Pagamento:</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="entry.1696132434" value="Cartão" required>
                            <div class="radio-box">💳 Cartão</div>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="entry.1696132434" value="Dinheiro">
                            <div class="radio-box">💵 Dinheiro</div>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="entry.1696132434" value="Pix">
                            <div class="radio-box">💠 Pix</div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Garantir Minha Vaga</button>
            </form>
        </div>

        <div class="success-message" id="successMessage">
            <div class="success-icon">✔</div>
            <h2>Inscrição Confirmada!</h2>
            <p>Seus dados foram enviados com sucesso. Será um prazer ter você na Dinâmica Oficina!</p>
        </div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" class="hidden-iframe" onload="if(submitted){ showSuccess(); }"></iframe>

    <script>
        var submitted = false;
        function showSuccess() {
            document.getElementById('formContent').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Máscara para CPF (000.000.000-00)
        function maskCPF(input) {
            let value = input.value.replace(/\D/g, ''); // Remove tudo que não é número
            if (value.length > 11) value = value.slice(0, 11);
            
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            
            input.value = value;
        }

        // Máscara para Data (DD/MM/AAAA)
        function maskDate(input) {
            let value = input.value.replace(/\D/g, ''); // Remove tudo que não é número
            if (value.length > 8) value = value.slice(0, 8);
            
            value = value.replace(/(\d{2})(\d)/, '$1/$2');
            value = value.replace(/(\d{2})(\d)/, '$1/$2');
            
            input.value = value;
        }

        // Carregar cidades usando a API do IBGE
        async function loadCities() {
            try {
                // Trazendo todas as cidades do Brasil
                const response = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/municipios');
                const cities = await response.json();
                
                const dataList = document.getElementById('cities-list');
                cities.forEach(city => {
                    const option = document.createElement('option');
                    // Formatando: "Nome da Cidade - Sigla do Estado"
                    const state = city.microrregiao.mesorregiao.UF.sigla;
                    option.value = `${city.nome} - ${state}`;
                    dataList.appendChild(option);
                });
            } catch (e) {
                console.log("Erro ao carregar cidades do IBGE", e);
            }
        }
        
        // Executa a busca de cidades assim que a página carregar
        window.addEventListener('DOMContentLoaded', loadCities);
    </script>
</body>
</html>
